<div class="terminal-page">
  <div class="terminal-header">
    <button mat-icon-button routerLink="/containers" aria-label="Back">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <span class="title">Terminal — {{ containerId.slice(0, 12) }}</span>
    <span class="status" [attr.data-status]="status()">{{ status() }}</span>
  </div>
  <div #term class="xterm-host" data-testid="terminal"></div>
</div>
